# Auto-loaded by plain `docker compose up` (no -f flags) for local
# development -- NOT loaded when explicitly running with
# docker-compose.prod.yml. Publishes Postgres/Qdrant ports to the host so
# they're reachable for local debugging (psql, the Qdrant dashboard, tests
# run outside Docker); production has no reason to expose the data stores
# beyond the Docker network the backend already shares with them.
services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  qdrant:
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
